<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  font-family: 'Courier Prime', 'Courier New', monospace;
  background: #f8f8f8;
  color: #1a1a1a;
  overflow: hidden;
  position: relative;
}

/* Top text section */
.text-section {
  padding: 60px 80px 40px 80px;
  height: 50%;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.username {
  font-size: 28px;
  font-weight: 400;
  color: #2a2a2a;
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

.tagline {
  font-size: 22px;
  color: #555;
  line-height: 1.5;
  margin-bottom: 50px;
  max-width: 700px;
}

.product-info {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.product-left {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.product-title {
  font-size: 42px;
  font-weight: 700;
  color: #1a1a1a;
}

.product-subtitle {
  font-size: 26px;
  color: #555;
}

.cta {
  font-size: 20px;
  color: #777;
  margin-top: 16px;
  font-style: italic;
}

.product-right {
  text-align: right;
}

.product-detail {
  font-size: 22px;
  color: #1a1a1a;
  line-height: 1.4;
}

.product-detail-small {
  font-size: 18px;
  color: #555;
  margin-top: 4px;
}

/* Photo section */
.photo-section {
  width: 100%;
  height: 50%;
  background: #d4d4d4;
  position: relative;
  overflow: hidden;
}

.photo-placeholder {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Slide number circle */
.slide-number {
  position: absolute;
  top: 50px;
  right: 60px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #2a2a2a;
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Courier Prime', monospace;
  font-size: 18px;
  font-weight: 400;
  z-index: 10;
}

/* Audio/play icon on photo */
.photo-icon {
  position: absolute;
  bottom: 30px;
  right: 40px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
}

.photo-icon::after {
  content: '';
  width: 0;
  height: 0;
  border-left: 14px solid white;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  margin-left: 3px;
}
</style>
</head>
<body>

<div class="slide-number">2/2</div>

<div class="text-section">
  <div class="username">@seamless.mrp</div>
  <div class="tagline">Inspired by the physics of movement: weight, momentum, falling and support.</div>
  
  <div class="product-info">
    <div class="product-left">
      <div class="product-title">Long sleeves</div>
      <div class="product-subtitle">Summer 2026</div>
      <div class="cta">DM to choose your colour, size, print or without.</div>
    </div>
    <div class="product-right">
      <div class="product-detail">Made-to-measure</div>
      <div class="product-detail">garments for dancers.</div>
      <div class="product-detail-small">Worldwide</div>
    </div>
  </div>
</div>

<div class="photo-section">
  <div class="photo-placeholder" style="background: linear-gradient(135deg, #c4b5a5 0%, #d4c8b8 30%, #b8a898 60%, #a89888 100%);"></div>
  <div class="photo-icon"></div>
</div>

</body>
</html>
