<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;700;900&family=Instrument+Sans:ital,wght@0,400;0,700;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  background: #0c0c1d;
  overflow: hidden;
  position: relative;
}

/* ===== VAR 21: LIQUID / DISTORTED TYPOGRAPHY ===== */

/* Gradient background blobs */
.liquid-bg-1 {
  position: absolute;
  top: -100px; left: -100px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, #7c3aed 0%, #6d28d9 30%, transparent 70%);
  filter: blur(60px);
  opacity: 0.4;
  z-index: 0;
}

.liquid-bg-2 {
  position: absolute;
  bottom: -100px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, #06b6d4 0%, #0891b2 30%, transparent 70%);
  filter: blur(60px);
  opacity: 0.35;
  z-index: 0;
}

.liquid-bg-3 {
  position: absolute;
  top: 40%; left: 50%;
  transform: translate(-50%, -50%);
  width: 400px; height: 400px;
  background: radial-gradient(circle, #f43f5e 0%, #e11d48 30%, transparent 70%);
  filter: blur(50px);
  opacity: 0.25;
  z-index: 0;
}

/* Distorted text - using transform skew + scale */
.distort-cluster {
  position: relative;
  z-index: 2;
  height: 100%;
  padding: 120px 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 30px;
}

.distort-line-1 {
  font-family: 'Unbounded', sans-serif;
  font-size: 70px;
  font-weight: 900;
  line-height: 1;
  color: #fff;
  transform: skewY(-3deg) scaleX(1.05);
  text-transform: uppercase;
  letter-spacing: -1px;
}

.distort-line-2 {
  font-family: 'Unbounded', sans-serif;
  font-size: 55px;
  font-weight: 300;
  line-height: 1;
  color: rgba(255,255,255,0.5);
  transform: skewY(2deg) translateX(40px);
  text-transform: uppercase;
  letter-spacing: 8px;
}

.distort-line-3 {
  font-family: 'Unbounded', sans-serif;
  font-size: 80px;
  font-weight: 500;
  line-height: 1;
  color: #06b6d4;
  transform: skewY(-1deg) scaleY(0.9);
  text-transform: uppercase;
}

/* Overlapping semi-transparent text */
.overlap-text {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 16px;
  line-height: 2;
  color: rgba(255,255,255,0.35);
  max-width: 500px;
  margin-top: 20px;
  letter-spacing: 2px;
}

/* Vertical text element */
.vert-distort {
  position: absolute;
  right: 50px;
  top: 50%;
  transform: translateY(-50%) skewY(-5deg);
  font-family: 'Unbounded', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.15);
  writing-mode: vertical-rl;
  letter-spacing: 4px;
  text-transform: uppercase;
  z-index: 2;
}

/* Floating number */
.float-num {
  position: absolute;
  top: 80px;
  left: 80px;
  font-family: 'Unbounded', sans-serif;
  font-size: 160px;
  font-weight: 900;
  color: rgba(255,255,255,0.04);
  line-height: 1;
  z-index: 1;
}

/* Dot pattern */
.dot-grid {
  position: absolute;
  top: 60px;
  right: 80px;
  display: grid;
  grid-template-columns: repeat(3, 12px);
  gap: 16px;
  z-index: 2;
}

.dot-grid span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: block;
}

.dot-grid span.active {
  background: #06b6d4;
}
</style>
</head>
<body>

<!-- Liquid blobs -->
<div class="liquid-bg-1"></div>
<div class="liquid-bg-2"></div>
<div class="liquid-bg-3"></div>

<div class="float-num">05</div>

<div class="dot-grid">
  <span class="active"></span><span></span><span></span>
  <span></span><span class="active"></span><span></span>
  <span></span><span></span><span class="active"></span>
</div>

<div class="vert-distort">SEAMLESS · MOVEMENT LAB · BALI · 2026</div>

<div class="distort-cluster">
  <div class="distort-line-1">the body</div>
  <div class="distort-line-2">is the</div>
  <div class="distort-line-3">instrument</div>
  
  <div class="overlap-text">
    Muscle · bone · breath · gravity · weight · momentum · 
    falling · catching · yielding · supporting · knowing · 
    the body plays the music of movement without a score
  </div>
</div>

</body>
</html>
