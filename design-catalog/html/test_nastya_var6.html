<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  font-family: 'Courier Prime', 'Courier New', monospace;
  background: #f8f6f2;
  color: #111;
  overflow: hidden;
  position: relative;
}

/* ===== VARIATION 6: Moodboard / Deconstructed Layout ===== */

/* Large number watermark */
.watermark-num {
  position: absolute;
  top: 100px;
  left: 60px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 200px;
  font-weight: 300;
  color: #e8e4de;
  line-height: 1;
  z-index: 0;
}

/* Main content grid */
.content {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 100px;
}

.label-row {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 40px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #111;
}

.label-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  letter-spacing: 4px;
  color: #888;
}

.main-quote {
  font-size: 72px;
  font-weight: 700;
  line-height: 1.1;
  max-width: 750px;
  margin-bottom: 50px;
  color: #111;
}

.meta-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.meta-left {
  font-size: 20px;
  color: #888;
  font-style: italic;
  line-height: 1.6;
}

.meta-right {
  text-align: right;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  letter-spacing: 2px;
  color: #aaa;
}

/* Vertical accent line */
.accent-line {
  position: absolute;
  right: 120px;
  top: 180px;
  width: 1px;
  height: 200px;
  background: #d4ccc0;
}

/* Photo badge */
.photo-badge {
  position: absolute;
  right: 80px;
  bottom: 100px;
  width: 240px;
  height: 240px;
  background: linear-gradient(135deg, #c4b5a5, #b5a292);
  z-index: 0;
}

.photo-badge-tag {
  position: absolute;
  right: 80px;
  bottom: 80px;
  font-size: 12px;
  color: #999;
  letter-spacing: 2px;
}

/* Corner elements */
.corner-tl {
  position: absolute;
  top: 60px;
  left: 80px;
  width: 40px;
  height: 1px;
  background: #ccc;
}

.corner-br {
  position: absolute;
  bottom: 60px;
  right: 80px;
  width: 40px;
  height: 1px;
  background: #ccc;
}

.page-marker {
  position: absolute;
  bottom: 50px;
  left: 100px;
  font-size: 16px;
  color: #bbb;
  font-family: 'IBM Plex Mono', monospace;
}
</style>
</head>
<body>

<div class="watermark-num">03</div>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="accent-line"></div>

<div class="photo-badge"></div>
<div class="photo-badge-tag">ph: @andrey_berezkin</div>

<div class="content">
  <div class="label-row">
    <div class="dot"></div>
    <div class="label-text">SEAMLESS · RESEARCH</div>
  </div>
  
  <div class="main-quote">
    "Gravity is not<br>an obstacle — it is<br>the conversation."
  </div>
  
  <div class="meta-row">
    <div class="meta-left">
      Steve Paxton<br>
      Contact Improvisation, 1972
    </div>
    <div class="meta-right">
      PART I<br>
      FOUNDATIONS<br>
      OF WEIGHT
    </div>
  </div>
</div>

<div class="page-marker">3/7</div>

</body>
</html>
