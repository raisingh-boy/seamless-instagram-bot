<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@300;400;600;900&family=Switzer:wght@300;400;600;800&family=Geist+Mono:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#f5f0e8;overflow:hidden;position:relative}

/* ===== ORGANIC / NOT GEOMETRIC ===== */

/* Photo - irregular placement, top center-ish but offset */
.photo-org{position:absolute;top:120px;left:50%;transform:translateX(-60%);width:340px;height:460px;object-fit:cover;filter:brightness(0.95)saturate(0.65)contrast(1.05);z-index:1}

/* VERTICAL Japanese - right side, NOT centered, top-aligned */
.v-jp-right{position:absolute;right:40px;top:80px;font-family:'Noto Serif JP',serif;font-size:14px;font-weight:400;color:rgba(0,0,0,0.12);writing-mode:vertical-rl;letter-spacing:2px;z-index:0;height:500px}

/* TINY mono label - far top left */
.tiny-label{position:absolute;top:50px;left:50px;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:4px;color:#ccc;z-index:2}

/* HUGE HEADLINE - bottom, spanning full width */
.big-bottom-headline{position:absolute;bottom:200px;left:80px;right:80px;font-family:'Switzer',sans-serif;font-size:100px;font-weight:800;line-height:0.9;color:#1a1a1a;letter-spacing:-3px;z-index:2}

/* Medium body - top right */
.body-top-right{position:absolute;top:180px;right:120px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:300;line-height:2;color:#bbb;max-width:200px;text-align:right;z-index:2}

/* ROTATED credit - bottom left corner */
.credit-bl{position:absolute;bottom:60px;left:0;font-family:'Geist Mono',monospace;font-size:8px;letter-spacing:4px;color:rgba(0,0,0,0.06);transform:rotate(-90deg);transform-origin:left bottom;white-space:nowrap;z-index:0}

/* Medium label - between photo and headline */
.mid-label{position:absolute;bottom:280px;left:80px;font-family:'Noto Serif JP',serif;font-size:20px;font-weight:300;color:#b5a595;letter-spacing:3px;z-index:2}

/* Tiny dot */
.dot{position:absolute;top:100px;right:200px;width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.08);z-index:0}

/* Page number - unusual placement */
.page-unusual{position:absolute;top:50%;right:80px;font-family:'Geist Mono',monospace;font-size:11px;color:#ddd;z-index:2}

/* Japanese chars scattered */
.jp-scatter-1{position:absolute;bottom:120px;right:90px;font-family:'Noto Serif JP',serif;font-size:90px;font-weight:900;color:rgba(0,0,0,0.025);z-index:0;line-height:1}
.jp-scatter-2{position:absolute;top:50%;left:50%;font-family:'Noto Serif JP',serif;font-size:70px;font-weight:300;color:rgba(0,0,0,0.02);z-index:0}
</style></head><body>

<div class="jp-scatter-1">動</div>
<div class="jp-scatter-2">静</div>
<div class="dot"></div>

<div class="v-jp-right">身体の知性 · 動きの中の哲学 · 重力との対話 · 接触即興の叡智 · 言葉を超えた理解</div>
<div class="credit-bl">PHOTOGRAPHY: ANDREY BEREZKIN · BALI · 2026 · SEAMLESS MOVEMENT RESEARCH LAB · CONTACT IMPROVISATION</div>

<img class="photo-org" src="file:///tmp/seamless_photo2.jpg" alt="">

<div class="tiny-label">SEAMLESS</div>
<div class="page-unusual">04</div>

<div class="body-top-right">
  動きは最も古い言語であり、身体は最も賢い教師である。
</div>

<div class="mid-label">— the moving body</div>

<div class="big-bottom-headline">
  gravity<br>
  remembers
</div>

</body></html>
