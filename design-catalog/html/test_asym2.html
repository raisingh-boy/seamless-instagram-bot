<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@300;400;700;900&family=Switzer:wght@300;400;600;800&family=Geist+Mono:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#faf9f6;overflow:hidden;position:relative}

/* PHOTO - bottom left, off-center */
.photo-bl{position:absolute;bottom:80px;left:70px;width:360px;height:480px;object-fit:cover;filter:brightness(0.95)saturate(0.7);z-index:1}

/* HEADLINE - top right, LARGE */
.headline-tr{position:absolute;top:100px;right:80px;font-family:'Switzer',sans-serif;font-size:76px;font-weight:800;line-height:0.95;color:#111;text-align:right;letter-spacing:-2px;z-index:2;max-width:500px}

/* Small mono label - top left */
.mono-tl{position:absolute;top:100px;left:80px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:5px;color:#ccc;z-index:2}

/* VERTICAL Korean - middle right */
.v-kr{position:absolute;right:35px;top:50%;transform:translateY(-50%);font-family:'Noto Serif KR',serif;font-size:13px;font-weight:300;color:rgba(0,0,0,0.1);writing-mode:vertical-rl;letter-spacing:2px;z-index:0}

/* Medium body - above photo, left-aligned */
.body-mid{position:absolute;bottom:300px;left:80px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:300;line-height:1.9;color:#aaa;max-width:320px;z-index:2}

/* ROTATED brand label */
.brand-rot{position:absolute;top:0;right:0;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(0,0,0,0.06);transform:rotate(90deg);transform-origin:right top;white-space:nowrap;z-index:0}

/* STAT - middle area, large number */
.stat-float{position:absolute;top:50%;left:80px;transform:translateY(-80%);font-family:'Switzer',sans-serif;font-size:120px;font-weight:800;color:rgba(0,0,0,0.04);line-height:1;z-index:0}

/* TINY line */
.hairline{position:absolute;top:280px;right:80px;width:60px;height:1px;background:rgba(0,0,0,0.1);z-index:2}

/* Korean character accent */
.kr-accent{position:absolute;top:160px;right:250px;font-family:'Noto Serif KR',serif;font-size:180px;font-weight:900;color:rgba(0,0,0,0.02);z-index:0}

.page-marker{position:absolute;bottom:60px;right:80px;font-family:'Geist Mono',monospace;font-size:13px;color:#ddd;z-index:2}
</style></head><body>

<div class="kr-accent">몸</div>
<div class="stat-float">639</div>
<div class="v-kr">몸의 움직임은 가장 순수한 형태의 철학이다</div>
<div class="brand-rot">SEAMLESS · MOVEMENT LAB · BALI · 2026 · RESEARCH</div>

<img class="photo-bl" src="file:///tmp/seamless_photo1.jpg" alt="">

<div class="mono-tl">MOVEMENT RESEARCH</div>
<div class="page-marker">03 / 07</div>

<div class="headline-tr">
  the body<br>
  decides<br>
  before the<br>
  mind knows
</div>

<div class="hairline"></div>

<div class="body-mid">
  身体は心が理解するよりも先に反応する。
  動きは思考の前に存在する知性であり、
  重力は最初の、そして最も信頼できる教師である。
</div>

</body></html>
