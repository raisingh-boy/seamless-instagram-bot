<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  font-family: 'Courier Prime', 'Courier New', monospace;
  background: #ffffff;
  color: #111;
  overflow: hidden;
  position: relative;
}

/* VARIATION 2: Full-photo background, text overlay */

.full-photo-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.05) 100%);
  z-index: 1;
}

.content-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 80px;
  z-index: 2;
  color: #ffffff;
}

.title-overlay {
  font-family: 'IBM Plex Mono', 'Courier Prime', monospace;
  font-size: 72px;
  font-weight: 400;
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 24px;
  max-width: 800px;
}

.subtitle-overlay {
  font-family: 'Courier Prime', monospace;
  font-size: 26px;
  font-weight: 400;
  color: rgba(255,255,255,0.85);
  line-height: 1.5;
  max-width: 600px;
  font-style: italic;
}

.tag {
  position: absolute;
  top: 60px;
  left: 80px;
  z-index: 2;
  font-size: 24px;
  color: rgba(255,255,255,0.9);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.page-dot {
  position: absolute;
  top: 60px;
  right: 80px;
  z-index: 2;
  width: 48px;
  height: 48px;
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.9);
  font-size: 16px;
}
</style>
</head>
<body>

<div class="full-photo-bg" style="background: linear-gradient(160deg, #8B9E93 0%, #6B7F73 20%, #4A5F55 40%, #2C3E35 60%, #1A2A22 100%);"></div>
<div class="overlay"></div>

<div class="tag">SEAMLESS</div>
<div class="page-dot">3</div>

<div class="content-overlay">
  <div class="title-overlay">Movement is the language of the body</div>
  <div class="subtitle-overlay">Research-backed somatic education for dancers and movers</div>
</div>

</body>
</html>
