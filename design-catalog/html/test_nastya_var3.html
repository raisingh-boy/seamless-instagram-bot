<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  font-family: 'Courier Prime', 'Courier New', monospace;
  background: #fafaf8;
  color: #1a1a1a;
  overflow: hidden;
  position: relative;
}

/* VARIATION 3: Minimalist editorial - centered text, large margins */

.container {
  padding: 120px 100px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.label {
  font-size: 18px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 40px;
}

.quote {
  font-size: 64px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 40px;
  max-width: 750px;
}

.attribution {
  font-size: 24px;
  color: #666;
  font-style: italic;
  margin-bottom: 60px;
}

.meta-line {
  width: 120px;
  height: 2px;
  background: #1a1a1a;
  margin-bottom: 30px;
}

.source {
  font-size: 20px;
  color: #888;
  letter-spacing: 0.5px;
}

.page-indicator {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-size: 22px;
  color: #aaa;
}

.accent-dot {
  position: absolute;
  top: 70px;
  right: 100px;
  width: 64px;
  height: 64px;
  background: #d4c8b8;
  border-radius: 50%;
  opacity: 0.6;
}
</style>
</head>
<body>

<div class="accent-dot"></div>

<div class="container">
  <div class="label">Research Note 04</div>
  <div class="quote">The body learns what the mind cannot grasp.</div>
  <div class="meta-line"></div>
  <div class="attribution">— Moshe Feldenkrais</div>
  <div class="source">Embodied cognition series · SEAMLESS Research</div>
</div>

<div class="page-indicator">4/7</div>

</body>
</html>
